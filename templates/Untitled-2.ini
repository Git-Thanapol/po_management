# Narration: Robust Training & Evaluation Pipeline for Underwater Propeller Sound Classification

## Objective
This pipeline implements a **leakage‑free**, **reproducible** methodology for classifying 4‑second underwater propeller recordings into four classes (Healthy, Barnacle, Imbalance, Seaweed) using a CNN‑MLP on Mel‑spectrograms.  
The workflow is designed to be executed by an AI agent with strict adherence to independence of data splits, correct preprocessing scoping, and unbiased performance estimation.

---

## 1. Initial Data Inspection & Metadata Enrichment

**Agent actions:**
- Load all 600 audio files (`.wav` or equivalent) with their class labels.
- Verify that each file has associated **metadata**:  
  - `session_id` (unique identifier for the continuous recording session or vessel trip)  
  - `vessel_id` (if available)  
  - `depth` (if available)  
  - `weather_condition` (if available)  
- If metadata are missing, **create a dummy `session_id` per file** – each file is assumed independent.  
- **Critical check:** Determine if any files are **non‑independent** (e.g., consecutive 4‑s clips cut from a longer recording).  
  - If file names indicate sequential order (e.g., `recording1_seg1.wav`, `recording1_seg2.wav`), group them under the same `session_id`.  
  - If no grouping information exists, assume each file is independent and assign unique `session_id`.

---

## 2. กำหนดกลยุทธ์การประเมิน (Validation Strategy)

- โหลด metadata: `file_id` (ชื่อไฟล์), `class_label`
- **กรณีใช้ 1 spectrogram ต่อ 1 ไฟล์**:
    - ใช้ StratifiedKFold (n_splits=5) โดย shuffle=True
- **กรณีใช้หลาย spectrogram ต่อ 1 ไฟล์**:
    - ต้องสร้าง windows หลังจาก split แล้วเท่านั้น
    - ใช้ GroupKFold (n_splits=5) โดย groups = file_id
- บันทึก fold indices เพื่อ reproducibility

---

## 3. Outer Cross‑Validation Loop

For each fold (according to the strategy above):

### 3.1 Split Data
- `train_idx`, `val_idx` – indices of **entire recordings / sessions**, **never individual windows**.  
- `X_train_paths`, `y_train`, `X_val_paths`, `y_val`.

### 3.2 Per‑Fold Preprocessing (Fit on Train Only)
**All preprocessing steps must learn parameters EXCLUSIVELY from the training fold.**

#### a) Bandpass Filter
- Apply **fixed** 0–900 Hz bandpass filter (Butterworth, order 4–6).  
- No adaptation; this is a deterministic transformation.

#### b) Spectral Gating / Noise Reduction
- Estimate noise profile **only from the training audio files**.  
- Use a robust method: median spectrum of non‑propeller segments (if available) or the lowest percentile of power per frequency bin.  
- Apply the same noise gate to both training and validation files **without re‑estimation**.

#### c) Stationary / Non‑Stationary Separation (Optional)
- If this step is used, compute the decision threshold (e.g., spectral flux percentile) **exclusively on training data**.  
- Transform both training and validation using that threshold.

### 3.3 Mel‑Spectrogram Generation
- Parameters: `n_mels=128`, `fmin=0`, `fmax=900`, `hop_length=441` (for 44.1 kHz, ~0.01s), `win_length=1102` (~0.025s).  
- Convert power spectrogram to dB:  
  - `ref = np.max(power_spectrogram_of_training_set)` – **compute ref only on training**.  
  - Apply `power_to_db(..., ref=ref)` to both train and validation.  

### 3.4 Normalisation (Per‑Spectrogram or Global)
- **Option A (recommended):** Fit `StandardScaler` on **all training spectrograms flattened** (or per channel).  
  - Transform training and validation using the fitted scaler.  
- **Option B (if memory is large):** Online batch normalisation inside the CNN – but still ensure no global statistics computed across validation.  

### 3.5 Windowing (If Multiple Spectrograms per Audio File are Desired)
- **Decision:** Should we use one full 4‑s spectrogram per file, or split into smaller windows?  
- If **multiple windows per file**:  
  - Use non‑overlapping windows (e.g., 2 s windows, 2 per file) to reduce correlation.  
  - **Crucial:** All windows of a given original file **must be assigned to the same fold** – do **not** split windows of the same file across train/validation.  
  - Implement this by windowing **after** the train/validation split, and replicate the file index as a group.  

### 3.6 Data Augmentation (Training Set Only)
- Apply augmentations **only to the training set**.  
- Use fixed augmentation parameters (tuned **once** on a development split prior to final pipeline, **not** per fold).  
- Common augmentations for spectrograms:  
  - Frequency masking (max mask size = 10 bins)  
  - Time masking (max mask size = 20 time steps)  
  - Gaussian noise (σ = 0.005)  
  - Time stretching (±10%) with phase vocoding  

### 3.7 Model Definition
- Define a CNN‑MLP architecture with fixed hyperparameters (or use nested CV – see Section 4).  
- Example minimal architecture:  
  - 2–3 convolutional layers (32, 64, 128 filters, kernel 3×3, ReLU)  
  - Max pooling (2×2)  
  - Global average pooling or flatten + dense layers (128, 64)  
  - Dropout (0.5)  
  - Output softmax (4 classes)  

### 3.8 Training
- Compile with Adam, learning rate = 0.001, categorical crossentropy.  
- Use **early stopping** on validation loss (patience = 10 epochs) – this is allowed **because the validation set is not used for any other tuning**.  
- Save the best model checkpoint for the fold.  

### 3.9 Evaluation on Validation Set
- For each validation file:  
  - If multiple windows per file: predict each window, take **majority vote** to obtain file‑level prediction.  
  - If single spectrogram per file: prediction = file‑level prediction.  
- Compute per‑fold:  
  - Accuracy  
  - Macro F1‑score  
  - Confusion matrix (normalised)  
- Store results.

---

## 4. Nested Cross‑Validation (If Hyperparameter Tuning is Required)

If you need to optimise model hyperparameters (number of layers, filter sizes, dropout rate, learning rate), **do not** use the outer validation folds for this purpose.

**Agent actions:**
- For **each outer training set**, perform an **inner cross‑validation** (e.g., 3‑fold GroupKFold on the outer training sessions).  
- Grid search over hyperparameters:  
  - Train on inner train, evaluate on inner validation.  
  - Select the hyperparameter set with highest mean inner validation score.  
- Retrain on the entire outer training set using the best hyperparameters, then evaluate on the outer validation set.  
- This yields **unbiased** performance estimate.

---

## 5. Post‑Pipeline Sanity Checks & Diagnostic Experiments

After the entire CV loop, run the following experiments to confirm validity:

### 5.1 Label Shuffling Test
- Randomly permute class labels in the **training set**.  
- Repeat the entire pipeline (or at least one fold).  
- Expected accuracy ≈ 25% (random). If significantly higher → **serious leakage** (e.g., overlapping windows, metadata contamination).

### 5.2 Baseline Model Comparison
- Extract simple spectral features (e.g., MFCCs, spectral centroid, rolloff) from the 4‑s audio.  
- Train a logistic regression or random forest **using the same cross‑validation splits**.  
- If the baseline achieves >90% accuracy, the problem is either very easy or still confounded.  
- If your CNN outperforms baseline by a small margin, it is plausible; if the gap is enormous, investigate further.

### 5.3 Session‑ID Classification Test
- Train a classifier (e.g., same CNN) to predict `session_id` from spectrograms **using training data only**.  
- Evaluate on validation set. High accuracy (>70% for many sessions) indicates strong batch effects – your model may be exploiting session‑specific signatures.  
- **Mitigation:** Use domain adaptation or explicitly note the limitation.

### 5.4 t‑SNE / PCA Visualisation
- Extract penultimate layer embeddings of validation samples.  
- Colour by true class and also by `session_id`.  
- If samples cluster by `session_id` more than by class → the model has learned confounders.

### 5.5 Grad‑CAM / Saliency Maps
- For a sample of validation spectrograms, generate Grad‑CAM heatmaps.  
- Verify that the model focuses on frequency regions plausibly related to propeller conditions (e.g., harmonics, modulation) rather than background noise or static artefacts.

## 5.6 การตรวจสอบการรั่วไหลจาก windows

- เลือก 1 fold ขึ้นมาแล้วตรวจสอบว่าไม่มี file_id ใดปรากฏทั้งใน train และ validation
- ถ้าพบ ให้กลับไปตรวจสอบขั้นตอน windowing และ grouping ทันที
---

## 6. Final Reporting & Reproducibility

**Agent output must include:**
- Mean and standard deviation of file‑level accuracy and macro F1 across outer folds.  
- Confusion matrix (summed or averaged).  
- Description of the validation strategy used (LOSO‑CV or GroupKFold), including number of independent sessions.  
- All hyperparameters (fixed or tuned via nested CV).  
- Random seeds and fold indices (save to `fold_indices.npy` or similar).  
- The complete code and environment specification.  
- A clear statement of limitations, especially regarding potential confounders (vessel, depth, weather) if they were not controlled.

---

## 7. Execution Instructions for the AI Agent

1. **Load data and metadata.**  
2. **Assign session‑level groups.**  
3. **Choose validation strategy** based on session count.  
4. **Outer loop** – for each fold:  
   - Split by groups.  
   - Fit preprocessing on train only.  
   - Generate spectrograms, normalise (fit on train).  
   - Optionally window (keep group constraints).  
   - Augment train set.  
   - Train model with early stopping.  
   - Evaluate on validation set (file‑level).  
   - Record metrics.  
5. **If tuning needed:** wrap outer loop with inner CV.  
6. **Run sanity checks** after CV completes.  
7. **Compile final report.**

---

## ⚠️ Critical Rules – Do Not Violate

- **Never** compute any dataset‑wide statistic (noise floor, normalisation mean/std, dB reference) before splitting.  
- **Never** allow windows of the same original recording to appear in both training and validation sets.  
- **Never** use the validation set to choose augmentation parameters, model architecture, or any hyperparameter **unless** you use nested cross‑validation.  
- **Never** report image‑level accuracy if multiple images per file exist – always aggregate to file level.

